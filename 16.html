<!DOCTYPE html>
<html>
<head>
    <title>Odd or Even</title>
</head>
<body>

<h2>Odd or Even from 0 to 15</h2>

<ul id="result"></ul>

<script>
    let list = document.getElementById("result");

    for (let i = 0; i <= 15; i++) {
        let li = document.createElement("li");
        li.textContent = i + (i % 2 === 0 ? " is even" : " is odd");
        list.appendChild(li);
    }
</script>

</body>
</html>
