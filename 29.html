<!DOCTYPE html>
<html>
<head>
    <title>Number Container</title>
    <style>
        #container {
            display: flex;
            flex-wrap: wrap;
            max-width: 600px;
        }
        .number {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 3px;
            color: white;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Numbers 0 to 100</h2>
<div id="container"></div>

<script>
    const container = document.getElementById("container");

    // Function to check prime
    function isPrime(num) {
        if (num < 2) return false;
        for (let i = 2; i <= Math.sqrt(num); i++) {
            if (num % i === 0) return false;
        }
        return true;
    }

    for (let i = 0; i <= 100; i++) {
        const div = document.createElement("div");
        div.textContent = i;
        div.classList.add("number");

        if (isPrime(i)) {
            div.style.backgroundColor = "red";       // Prime numbers
        } else if (i % 2 === 0) {
            div.style.backgroundColor = "green";     // Even numbers
        } else {
            div.style.backgroundColor = "yellow";    // Odd numbers
            div.style.color = "black";               // Better contrast
        }

        container.appendChild(div);
    }
</script>

</body>
</html>
