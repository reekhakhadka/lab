<!DOCTYPE html>
<html>
<head>
    <title>Analog Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .clock {
            width: 300px;
            height: 300px;
            border: 10px solid #333;
            border-radius: 50%;
            position: relative;
            background: white;
        }

        /* Clock hands */
        .hand {
            position: absolute;
            width: 50%; /* length of the hand */
            height: 4px; /* default, overridden for each hand */
            top: 50%;
            left: 50%;
            transform-origin: left center; /* rotate from the center */
            transform: rotate(0deg);
            border-radius: 2px;
        }

        .hour {
            height: 6px;
            background-color: #000;
        }

        .minute {
            height: 4px;
            background-color: #555;
        }

        .second {
            height: 2px;
            background-color: red;
        }

        .center {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Clock numbers */
        .number {
            position: absolute;
            width: 30px;
            height: 30px;
            text-align: center;
            font-weight: bold;
            transform-origin: center;
        }
    </style>
</head>
<body>

<div class="clock" id="clock">
    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="center"></div>
</div>

<script>
    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");
    const clock = document.getElementById("clock");

    // Add numbers 1 to 12
    for (let i = 1; i <= 12; i++) {
        const num = document.createElement("div");
        num.classList.add("number");
        num.textContent = i;
        const angle = i * 30; // 360/12 = 30 degrees
        const radius = 120; // distance from center
        const x = 150 + radius * Math.sin(angle * Math.PI / 180) - 15;
        const y = 150 - radius * Math.cos(angle * Math.PI / 180) - 15;
        num.style.left = x + "px";
        num.style.top = y + "px";
        clock.appendChild(num);
    }

    function updateClock() {
        const now = new Date();
        const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
        const minutes = now.getMinutes() + seconds / 60;
        const hours = now.getHours() + minutes / 60;

        const secondDeg = seconds * 6; // 360 / 60
        const minuteDeg = minutes * 6; // 360 / 60
        const hourDeg = (hours % 12) * 30; // 360 / 12

        secondHand.style.transform = `rotate(${secondDeg}deg)`;
        minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
        hourHand.style.transform = `rotate(${hourDeg}deg)`;
    }

    setInterval(updateClock, 50); // smooth movement
    updateClock(); // initial call
</script>

</body>
</html>
