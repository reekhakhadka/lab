<!DOCTYPE html>
<html>
<head>
    <title>Largest and Smallest of Three Numbers</title>
</head>
<body>

<h2>Find Largest and Smallest Number</h2>

<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">
<input type="number" id="num3" placeholder="Enter third number">

<br><br>

<button onclick="compareThreeNumbers()">Compare</button>

<p id="result"></p>

<script>
    function compareThreeNumbers() {
        let a = parseInt(document.getElementById("num1").value);
        let b = parseInt(document.getElementById("num2").value);
        let c = parseInt(document.getElementById("num3").value);

        if (isNaN(a) || isNaN(b) || isNaN(c)) {
            document.getElementById("result").innerHTML = "Please enter valid integers.";
            return;
        }

        let largest = a;
        let smallest = a;

        if (b > largest) largest = b;
        if (c > largest) largest = c;

        if (b < smallest) smallest = b;
        if (c < smallest) smallest = c;

        document.getElementById("result").innerHTML = 
            "Largest number: " + largest + "<br>Smallest number: " + smallest;
    }
</script>

</body>
</html>
